name: Build C# EXE (SCD+FDD) and Upload to GitHub Release
on:
  push:
    tags: ['v*']  # 简化版本号匹配规则
  workflow_dispatch:
    inputs:
      tag_name:
        description: '指定要打包的版本Tag名称（如 v1.0.0、V2.1.0）'
        required: true
        default: 'v1.0.0'
        type: string

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write  # 授予写入 Release 的权限
    defaults:
      run:
        shell: pwsh  # 统一使用PowerShell作为默认shell

    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整提交历史

      - name: 2. 安装 .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'  # 建议改为具体的稳定版本（如8.1.x）

      - name: 3. 恢复项目依赖
        run: dotnet restore eyesharp.csproj  # 指向项目文件

      - name: 4. 构建并发布 SCD 版本
        run: |
          dotnet publish `
            eyesharp.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -o ${{ github.workspace }}/publish-scd

      - name: 5. 构建并发布 FDD 版本
        run: |
          dotnet publish `
            eyesharp.csproj `
            --configuration Release `
            --no-self-contained `
            -o ${{ github.workspace }}/publish-fdd

      # 调试：确认发布文件（生产环境建议关闭）
      - name: 调试：查看发布目录
        if: always()  # 始终执行
        run: |
          Get-ChildItem -Recurse ${{ github.workspace }}/publish-scd | Out-Host
          Get-ChildItem -Recurse ${{ github.workspace }}/publish-fdd | Out-Host

      # 核心优化：动态生成标准化文件名
      - name: 6. 生成标准化ZIP文件
        id: generate-zip
        run: |
          $tag = "${{ github.event.inputs.tag_name || github.ref_name }}".TrimStart('v')
          $version = "v${tag}"

          $scdZip = "EyeSharp_${version}-win-x64_scd.zip"
          $fddZip = "EyeSharp_${version}-win-x64_fdd.zip"

          Compress-Archive `
            -Path ${{ github.workspace }}/publish-scd/* `
            -DestinationPath $scdZip `
            -Force
          Compress-Archive `
            -Path ${{ github.workspace }}/publish-fdd/* `
            -DestinationPath $fddZip `
            -Force

          Write-Output "scd_zip=$scdZip" >> $env:GITHUB_OUTPUT
          Write-Output "fdd_zip=$fddZip" >> $env:GITHUB_OUTPUT

      # 调试：确认ZIP文件（生产环境建议关闭）
      - name: 调试：验证ZIP文件
        if: always()
        run: |
          Get-Item -Path ${{ steps.generate-zip.outputs.scd_zip }}
          Get-Item -Path ${{ steps.generate-zip.outputs.fdd_zip }}

      # 核心优化：安全上传Release
      - name: 7. 上传发布包到GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: |
            ${{ steps.generate-zip.outputs.scd_zip }}
            ${{ steps.generate-zip.outputs.fdd_zip }}
          draft: false  # 自动发布而非草稿
          prerelease: false  # 非预发布版本
          body: |
            📦 版本说明：
            - **SCD 版本**：独立运行时，双击即可运行（推荐大多数用户）
            - **FDD 版本**：需手动安装 .NET 8.0 运行时（适合开发者调试）
            📥 运行时下载：https://dot.net/core

      # 清理工作区（可选）
      - name: 8. 清理临时文件
        if: always()
        run: |
          Remove-Item -Recurse -Force ${{ github.workspace }}/publish-*
